{{- if .Values.networkPolicy.enabled }}
{{- range .Values.namespaces }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: {{ .name }}
spec:
  podSelector: {}      # applies to all pods in the namespace
  policyTypes:
    - Ingress
    - Egress
{{- end }}
{{- end }}
