# Global settings
global:
  environment: production
  project: gke-migration

# Namespaces to create
namespaces:
  - name: production
    labels:
      env: production
  - name: staging
    labels:
      env: staging
  - name: monitoring
    labels:
      env: monitoring

# Resource quotas per namespace
resourceQuota:
  production:
    requests.cpu: "10"
    requests.memory: 20Gi
    limits.cpu: "20"
    limits.memory: 40Gi
    pods: "50"
  staging:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    pods: "20"

# NGINX Ingress Controller
ingress:
  enabled: true
  replicaCount: 2
  service:
    type: LoadBalancer
    annotations:
      cloud.google.com/load-balancer-type: "External"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Network policies
networkPolicy:
  enabled: true
  defaultDenyAll: true   # zero-trust: deny everything, then allow explicitly
