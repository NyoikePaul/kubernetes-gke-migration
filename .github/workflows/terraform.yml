name: Terraform CI/CD
 
on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - "helm/**"
      - "k8s/**"
      - "security/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
 
env:
  TF_VERSION: "1.7.5"
  WORKING_DIR: "./terraform"
 
jobs:
  terraform-validate:
    name: Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
 
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
 
      - name: Terraform Format Check
        run: terraform fmt -check -recursive
 
      - name: Terraform Init
        run: terraform init -backend=false
 
      - name: Terraform Validate
        run: terraform validate -no-color
 
  helm-validate:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: "3.14.0"
 
      - name: Helm Lint
        run: helm lint helm/gke-platform
 
      - name: Helm Template (dry-run)
        run: helm template gke-platform helm/gke-platform > /dev/null && echo "✅ Helm template valid"
 
  preview:
    name: Preview
    needs: [terraform-validate, helm-validate]
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: https://kubernetes-gke-migration.vercel.app
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform init -backend=false
      - run: terraform validate -no-color
      - name: Preview OK
        run: echo "✅ Infrastructure validated — preview gate cleared."
 
  production:
    name: Production
    needs: preview
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://kubernetes-gke-migration.vercel.app
    steps:
      - uses: actions/checkout@v4
 
      - name: tfsec Security Scan
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: true
          format: lovely
 
      - name: Production OK
        run: echo "✅ Security scan complete — production gate cleared."
